<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="masa_oのリンク集です。">
    <!-- 検索除け（必須要件） -->
    <meta name="robots" content="noindex, nofollow">
    <title>masa_o | Link Site</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts (例: Noto Sans JP と Outfit を使用) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="container">
        <!-- プロフィールセクション -->
        <header class="profile">
            <div class="profile-image-wrapper">
                <img src="assets/avatar.png" alt="masa_o profile picture" class="profile-image" width="120"
                    height="120">
            </div>
            <h1 class="profile-name">masa_o</h1>
            <p class="profile-bio">
                短い自己紹介文が入ります。<br>
                趣味や職業など、簡単な説明をここに記述します。
            </p>
        </header>

        <!-- リンク一覧セクション -->
        <div class="links">
            <ul class="link-list">
                <li class="link-item">
                    <a href="https://twitter.com/" target="_blank" rel="noopener noreferrer" class="link-button">
                        <span class="link-text">Twitter (X)</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer" class="link-button">
                        <span class="link-text">Instagram</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="#" target="_blank" rel="noopener noreferrer" class="link-button">
                        <span class="link-text">Blog</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="https://github.com/" target="_blank" rel="noopener noreferrer" class="link-button">
                        <span class="link-text">GitHub</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="mailto:example@example.com" class="link-button">
                        <span class="link-text">Contact</span>
                    </a>
                </li>
            </ul>
        </div>
    </main>
</body>

</html>
