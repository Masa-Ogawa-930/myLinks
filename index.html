<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="masa_oのリンク集です。">
    <!-- 検索除け（必須要件） -->
    <meta name="robots" content="noindex, nofollow">
    <title>myLinks_masa</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts (例: Noto Sans JP と Outfit を使用) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="container">
        <!-- プロフィールセクション -->
        <header class="profile">
            <div class="profile-image-wrapper">
                <img src="assets/R1034399_filtered-1.jpg" alt="masa_o profile picture" class="profile-image" width="120"
                    height="120">
            </div>
            <h1 class="profile-name">Masa</h1>
            <p class="profile-bio">
                <!-- 短い自己紹介文が入ります。<br> -->

            </p>
        </header>

        <!-- リンク一覧セクション -->
        <div class="links">
            <ul class="link-list">
                <li class="link-item">
                    <a href="https://masa19939.wordpress.com/" target="_blank" rel="noopener noreferrer"
                        class="link-button">
                        <img src="assets/blog.jpeg" alt="" class="link-thumb">
                        <span class="link-text">Blog (in JP)</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="https://www.instagram.com/m_yukiog" target="_blank" rel="noopener noreferrer"
                        class="link-button">
                        <img src="assets/instagram-icon.jpg" alt="" class="link-thumb">
                        <span class="link-text">Instagram</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="https://detohma.com/" target="_blank" rel="noopener noreferrer" class="link-button">
                        <img src="assets/detohma.png" alt="" class="link-thumb">
                        <span class="link-text">detohma (band)</span>
                    </a>
                </li>
                <li class="link-item">
                    <div class="video-container">
                        <iframe width="560" height="315" src="https://www.youtube.com/embed/sn9_Bsf8AAs"
                            title="YouTube video player" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    </div>
                    <a href="https://www.youtube.com/watch?v=sn9_Bsf8AAs" target="_blank" rel="noopener noreferrer"
                        class="link-button no-thumb">
                        <span class="link-text">detohma - "BlueHaze" Music Video</span>
                    </a>
                </li>

                <li class="link-item">
                    <a href="https://youtu.be/fGNJ0Eo6Enw?si=1l3iGYOpn-8J1gEu" class="link-button" target="_blank"
                        rel="noopener noreferrer">
                        <img src="assets/easygerman.jpeg" alt="" class="link-thumb">
                        <span class="link-text">I made a brief apparence in an Easy German video</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="https://alive-at-a-live.jimdofree.com/" class="link-button" target="_blank"
                        rel="noopener noreferrer">
                        <img src="assets/alive.jpeg" alt="" class="link-thumb">
                        <span class="link-text">Alive at A Live (band, 2012-2014)</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="https://www.youtube.com/@satorusong" class="link-button" target="_blank"
                        rel="noopener noreferrer">
                        <img src="assets/satoru.jpeg" alt="" class="link-thumb">
                        <span class="link-text">Vocaloid original songs (2014-2015)</span>
                    </a>
                </li>
                <li class="link-item hide">
                    <a href="https://www.youtube.com/watch?v=4GF5VXx-8Lo" class="link-button" target="_blank"
                        rel="noopener noreferrer">
                        <img src="assets/hpi25.jpg" alt="" class="link-thumb">
                        <span class="link-text">25 Jahre HPI: Das HPI Sommerfest 2024</span>
                    </a>
                </li>
            </ul>
        </div>
    </main>
</body>

</html>
